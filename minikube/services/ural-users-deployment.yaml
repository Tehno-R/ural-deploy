apiVersion: apps/v1
kind: Deployment
metadata:
  name: ural-users
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ural-users
  template:
    metadata:
      labels:
        app: ural-users
    spec:
      containers:
        - name: ural-users
          image: kerzhakovn/ural-users-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: DB_URL
              value: "jdbc:postgresql://postgres:5432"
            - name: DB_NAME
              value: "ural"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASS
              value: "postgres"
            - name: SHOW_SQL
              value: "false"
            - name: AUTH_URL
              value: "http://ural-auth:10006/api/auth"
            - name: LOGGING_LEVEL_ROOT
              value: "info"
          imagePullPolicy: Always


---
apiVersion: v1
kind: Service
metadata:
  name: ural-users
  namespace: dev
spec:
  type: NodePort
  selector:
    app: ural-users
  ports:
    - port: 10005 
      targetPort: 8080 
      nodePort: 30005