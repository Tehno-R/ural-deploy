apiVersion: apps/v1
kind: Deployment
metadata:
  name: ural-cars
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ural-cars
  template:
    metadata:
      labels:
        app: ural-cars
    spec:
      containers:
        - name: ural-cars
          image: kerzhakovn/ural-cars-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: DB_URL
              value: "jdbc:postgresql://postgres.infra.svc.cluster.local:5432"
            - name: DB_NAME
              value: "ural"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASS
              value: "postgres"
            - name: SHOW_SQL
              value: "false"
            - name: LOGGING_LEVEL_ROOT
              value: "info"
          imagePullPolicy: Always


---
apiVersion: v1
kind: Service
metadata:
  name: ural-cars
  namespace: dev
spec:
  type: NodePort
  selector:
    app: ural-cars
  ports:
    - port: 10002
      targetPort: 8080 
      nodePort: 30002