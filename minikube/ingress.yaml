apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: appingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
    - http:
        paths:
          - path: /ural-aggregator
            pathType: Prefix
            backend:
              service:
                name: ural-aggregator
                port:
                  number: 10000
