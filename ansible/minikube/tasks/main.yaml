# --- Applying Manifests ---
- name: Apply manifests for infrastructure
  command: kubectl apply -f {{ manifests_path }}/{{ item }}
  loop: "{{ infra }}"
  loop_control:
    label: "{{ item }}"

# --- Applying Manifests ---
- name: Apply manifests for services
  command: kubectl apply -f {{ manifests_services_path }}/{{ item }}
  loop: "{{ services }}"
  loop_control:
    label: "{{ item }}"

# --- Applying Manifests ---
- name: Apply manifests for monitoring
  command: kubectl apply -f {{ manifests_observability_path }}/{{ item }}
  loop: "{{ monitoring }}"
  loop_control:
    label: "{{ item }}"

# --- Install kube-state-metrics ---
- name: Install kube-state-metrics
  command: helm install kube-state-metrics prometheus-community/kube-state-metrics -n monitoring

# --- Install HeadLamp ---
- name: Install HeadLamp
  command: helm install headlamp headlamp/headlamp --namespace headlamp --set service.type=NodePort --set service.nodePort={{ headlamp_port }}