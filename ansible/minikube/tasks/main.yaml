# --- Start Minikube ---
- block:
  - name: Delete minikube cluster
    command: minikube delete

  - name: Start minikube
    command: minikube start --cpus=4 --memory=6144 --preload=false
  when: recreate | bool

- block:
  - name: Check minikube status
    command: minikube status --format '{% raw %}{{.Host}}{% endraw %}'
    register: minikube_status
    failed_when: false
    changed_when: false

  - name: Start minikube if not running
    command: minikube start
    when: minikube_status.stdout != "Running"
  when: not (recreate | bool)

# --- Repo ---
- name: Remove repo if exists
  file:
    path: "{{ repo_dest }}"
    state: absent

- name: Clone repo
  git:
    repo: "{{ repo_url }}"
    dest: "{{ repo_dest }}"
    version: HEAD

